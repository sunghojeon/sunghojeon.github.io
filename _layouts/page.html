---
layout: default
---

<article class="page">
  {% if page.title %}
    {% if page.hide_page_title %}
    <h1 class="visually-hidden">{{ page.title }}</h1>
    {% else %}
    <header class="page-header">
      <h1 class="page-title">{{ page.title }}</h1>
    </header>
    {% endif %}
  {% endif %}

  <div class="entry">
    {{ content }}
  </div>
</article>
