name: Refresh RTK news

# Target: ~09:00 and ~21:00 KST (UTC+9). GitHub cron is queued best-effort,
# and minute-0 slots — 00:00 UTC worst of all — are so congested that the
# first three scheduled runs each started 1-2 h late. An off-peak minute,
# scheduled ~25 min ahead of the target, absorbs the typical queue delay.
on:
  schedule:
    - cron: "37 23 * * *"
    - cron: "37 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rtk-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install anthropic

      # Claude Code CLI — vetting/summaries run on the Claude subscription
      # (CLAUDE_CODE_OAUTH_TOKEN from `claude setup-token`) instead of the
      # metered API. ANTHROPIC_API_KEY remains a fallback path in the script.
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # The committed timeline data store (not a website page — the public
      # In-the-news page was removed), to diff the fetched articles against.
      - name: Snapshot current timeline
        run: cp scripts/news_timeline.html /tmp/news.before.html

      # --evolve mines the fetched articles for new search queries (new
      # companies, programs, regulators) and adds the accepted ones to
      # rtk_news_queries.json, so the query set tracks the field instead of
      # staying frozen at the seeds. Learned queries that come up empty three
      # runs running are disabled automatically.
      - name: Fetch news
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/fetch_rtk_news.py --since 2026-06-01 --limit 70 --max-per-query 20 --evolve --yes

      - name: Summarize new articles and notify Telegram
        id: notify
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/news_notify.py /tmp/news.before.html scripts/news_timeline.html

      # The timeline carries a "last updated" stamp that changes every run, so
      # a run where no article changed still shows the file as modified.
      # Discard that edit rather than pushing a no-op (every push still
      # triggers a Pages rebuild, even though scripts/ is not rendered).
      # The learned-query file is committed on its own merit.
      - name: Commit
        run: |
          if [ "${{ steps.notify.outputs.changed }}" != "true" ]; then
            echo "Article list unchanged — discarding the timestamp-only edit."
            git checkout -- scripts/news_timeline.html
          fi
          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/news_timeline.html scripts/rtk_news_queries.json scripts/news_seen.json
          git commit -m "news: refresh timeline (${{ steps.notify.outputs.added }} new)"
          git push
