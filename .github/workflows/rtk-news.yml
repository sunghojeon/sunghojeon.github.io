name: Refresh RTK news

# 09:00 and 21:00 KST (UTC+9).
on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rtk-news
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install anthropic

      # The committed page, to diff the fetched articles against.
      - name: Snapshot current page
        run: cp broadcast-rtk.md /tmp/broadcast-rtk.before.md

      # --evolve mines the fetched articles for new search queries (new
      # companies, programs, regulators) and adds the accepted ones to
      # rtk_news_queries.json, so the query set tracks the field instead of
      # staying frozen at the seeds. Learned queries that come up empty three
      # runs running are disabled automatically.
      - name: Fetch news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_rtk_news.py --since 2026-06-01 --limit 50 --evolve --yes

      - name: Summarize new articles and notify Telegram
        id: notify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/news_notify.py /tmp/broadcast-rtk.before.md broadcast-rtk.md

      # The page carries a "last updated" stamp that changes every run, so a
      # run where no article changed still shows the page as modified. Discard
      # that edit rather than pushing a no-op (each push rebuilds Pages).
      # The learned-query file is committed on its own merit.
      - name: Commit
        run: |
          if [ "${{ steps.notify.outputs.changed }}" != "true" ]; then
            echo "Article list unchanged — discarding the timestamp-only edit."
            git checkout -- broadcast-rtk.md
          fi
          if git diff --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add broadcast-rtk.md scripts/rtk_news_queries.json
          git commit -m "broadcast-rtk: refresh news timeline (${{ steps.notify.outputs.added }} new)"
          git push
